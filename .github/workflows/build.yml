name: Build VinzzRenderer APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin

      - uses: actions/checkout@v4
        with:
          repository: VinzzLK/VinzzRenderer
          path: core

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: sdkmanager "ndk;27.3.13750724"

      - name: Link core
        run: cp -r core/MobileGlues-cpp plugin/MobileGlues/MobileGlues-cpp

      - name: Build APK
        run: |
          cd plugin
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: VinzzRenderer-APK
          path: plugin/app/build/outputs/apk/debug/*.apk
