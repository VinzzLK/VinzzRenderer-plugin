name: Build VinzzRenderer APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: VinzzLK/VinzzRenderer
          path: core

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: sdkmanager "ndk;27.3.13750724"

      - name: Link core + fix local.properties
        run: |
          mkdir -p MobileGlues
          cp -r core/MobileGlues-cpp MobileGlues/MobileGlues-cpp
          rm -f local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/27.3.13750724" >> local.properties

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "=== BUILD ERRORS ==="
          grep -E "^.*error:.*$" build.log | grep -v "NDK\|CXX5106\|ndk.dir\|deprecated" | head -30 || true
          exit $BUILD_EXIT

      - name: Find APK
        if: always()
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: VinzzRenderer-APK-unsigned
          path: app/build/outputs/apk/debug/app-debug.apk
