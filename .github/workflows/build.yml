name: Build VinzzRenderer APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: VinzzLK/VinzzRenderer
          path: core

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: sdkmanager "ndk;27.3.13750724"

      - name: Link core + fix local.properties
        run: |
          mkdir -p MobileGlues
          cp -r core/MobileGlues-cpp MobileGlues/MobileGlues-cpp
          ls MobileGlues/MobileGlues-cpp/CMakeLists.txt
          rm -f local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/27.3.13750724" >> local.properties

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tail -100

      - uses: actions/upload-artifact@v4
        with:
          name: VinzzRenderer-APK
          path: app/build/outputs/apk/**/*.apk
